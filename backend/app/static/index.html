<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protein Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f7f4ed;
      color: #1f1f1f;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #d9d1bf;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #205c3b;
      color: white;
      padding: 0.85rem 1.2rem;
      cursor: pointer;
      font-size: 1rem;
    }

    pre {
      background: #f3eee2;
      padding: 1rem;
      border-radius: 12px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Protein Finder</h1>
    <p>First-step user testing: choose your start location and tell us what you want to eat.</p>
    <div style="margin-bottom: 1rem;">
      <label>
        <input type="radio" id="mode-current" name="origin-mode" value="current" checked>
        Use my current location
      </label>
      <br>
      <label>
        <input type="radio" id="mode-typed" name="origin-mode" value="typed">
        Type my location
      </label>
    </div>
    <div style="margin-bottom: 1rem;">
      <label for="typed-origin">Typed location (only used in typed mode):</label>
      <input id="typed-origin" type="text" placeholder="e.g. Shields Library, Davis CA" style="width:100%;padding:0.65rem;border:1px solid #d0c7b6;border-radius:10px;">
    </div>
    <div style="margin-bottom: 1rem;">
      <label for="food-query">What do you want to eat?</label>
      <input id="food-query" type="text" placeholder="e.g. chicken bowl, protein snack" style="width:100%;padding:0.65rem;border:1px solid #d0c7b6;border-radius:10px;">
    </div>
    <button id="submit-btn" type="button">Run user test</button>
    <pre id="result">Waiting for user test input...</pre>
  </main>
  <script>
    const button = document.getElementById("submit-btn");
    const result = document.getElementById("result");
    const modeCurrent = document.getElementById("mode-current");
    const typedOriginInput = document.getElementById("typed-origin");
    const foodQueryInput = document.getElementById("food-query");

    async function sendUserTestingRequest(payload) {
      const response = await fetch("/api/user-testing", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "User test request failed");
      }
      return data;
    }

    button.addEventListener("click", async () => {
      const foodQuery = foodQueryInput.value.trim();
      if (!foodQuery) {
        result.textContent = "Please type what you want to eat.";
        return;
      }

      if (modeCurrent.checked) {
        if (!navigator.geolocation) {
          result.textContent = "Geolocation is not supported in this browser.";
          return;
        }
        result.textContent = "Requesting current location...";
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            try {
              const { latitude, longitude } = position.coords;
              const output = await sendUserTestingRequest({
                origin_mode: "current",
                origin_latitude: latitude,
                origin_longitude: longitude,
                food_query: foodQuery
              });
              result.textContent = JSON.stringify(output, null, 2);
            } catch (error) {
              result.textContent = `Error: ${error.message}`;
            }
          },
          (error) => {
            result.textContent = `Location error: ${error.message}`;
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      } else {
        const typedOrigin = typedOriginInput.value.trim();
        if (!typedOrigin) {
          result.textContent = "Please type your location or switch to current mode.";
          return;
        }
        result.textContent = "Geocoding typed location and testing route...";
        try {
          const output = await sendUserTestingRequest({
            origin_mode: "typed",
            origin_text: typedOrigin,
            food_query: foodQuery
          });
          result.textContent = JSON.stringify(output, null, 2);
        } catch (error) {
          result.textContent = `Error: ${error.message}`;
        }
      }
    });

    
  </script>
</body>
</html>
