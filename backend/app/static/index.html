<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Protein Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f7f4ed;
      color: #1f1f1f;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #d9d1bf;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #205c3b;
      color: white;
      padding: 0.85rem 1.2rem;
      cursor: pointer;
      font-size: 1rem;
    }

    pre {
      background: #f3eee2;
      padding: 1rem;
      border-radius: 12px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Protein Finder</h1>
    <p><a href="/static/recommendations.html">Open Protein Recommendations Page</a></p>
    <p><a href="/static/route.html">Open Route Map Page</a></p>
    <p>Feature 1 test: choose your origin (current location or typed), type destination, and see miles.</p>
    <div style="margin-bottom: 1rem;">
      <label><strong>Origin option 1:</strong> Use current location</label><br>
      <button id="use-current-btn" type="button">Use current location</button>
      <div id="current-status" style="margin-top:0.5rem;font-size:0.95rem;color:#4b4b4b;">Current location not set yet.</div>
    </div>
    <div style="margin-bottom: 1rem;">
      <label for="origin-text"><strong>Origin option 2:</strong> Type your location manually</label>
      <input id="origin-text" type="text" placeholder="e.g. Shields Library, Davis CA" style="width:100%;padding:0.65rem;border:1px solid #d0c7b6;border-radius:10px;">
    </div>
    <div style="margin-bottom: 1rem;">
      <label for="destination-text">Destination place (address or place name):</label>
      <input id="destination-text" type="text" placeholder="e.g. Silo Market Davis CA" style="width:100%;padding:0.65rem;border:1px solid #d0c7b6;border-radius:10px;">
    </div>
    <div style="margin-bottom: 1rem;">
      <label for="travel-mode">Travel mode:</label>
      <select id="travel-mode" style="width:100%;padding:0.65rem;border:1px solid #d0c7b6;border-radius:10px;">
        <option value="driving">Driving</option>
        <option value="walking">Walking</option>
      </select>
    </div>
    <button id="submit-btn" type="button">Calculate Distance In Miles</button>
    <pre id="result">Ready for location-to-location distance test.</pre>
  </main>
  <script>
    const button = document.getElementById("submit-btn");
    const useCurrentButton = document.getElementById("use-current-btn");
    const result = document.getElementById("result");
    const currentStatus = document.getElementById("current-status");
    const originInput = document.getElementById("origin-text");
    const destinationInput = document.getElementById("destination-text");
    const travelModeInput = document.getElementById("travel-mode");
    let currentOrigin = null;

    async function requestDistance(payload) {
      const response = await fetch("/api/distance", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "Distance request failed");
      }
      return data;
    }

    useCurrentButton.addEventListener("click", () => {
      if (!navigator.geolocation) {
        currentStatus.textContent = "Geolocation is not supported in this browser.";
        return;
      }
      currentStatus.textContent = "Requesting your current location...";
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          currentOrigin = { latitude, longitude };
          currentStatus.textContent = `Current location set: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        },
        (error) => {
          currentStatus.textContent = `Location error: ${error.message}`;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });

    button.addEventListener("click", async () => {
      const destinationText = destinationInput.value.trim();
      if (!destinationText) {
        result.textContent = "Please type a destination place first.";
        return;
      }
      const travelMode = travelModeInput.value;

      let payload = null;
      const typedOrigin = originInput.value.trim();
      if (typedOrigin) {
        payload = {
          origin_mode: "typed",
          origin_text: typedOrigin,
          destination_text: destinationText,
          travel_mode: travelMode
        };
      } else if (currentOrigin) {
        payload = {
          origin_mode: "current",
          origin_latitude: currentOrigin.latitude,
          origin_longitude: currentOrigin.longitude,
          destination_text: destinationText,
          travel_mode: travelMode
        };
      } else {
        result.textContent = "Pick an origin first: click 'Use current location' OR type your origin location.";
        return;
      }

      result.textContent = "Calculating route miles with Google Maps...";
      try {
        const output = await requestDistance(payload);

        result.textContent =
          "Distance Test Output\n" +
          "====================\n" +
          `Origin Mode: ${output.origin_mode}\n` +
          `Origin Resolved: ${output.origin_resolved}\n` +
          `Travel Mode: ${output.travel_mode}\n` +
          `Destination Entered: ${output.destination_text}\n` +
          `Destination Resolved: ${output.destination_resolved}\n` +
          `Distance (miles): ${output.distance_miles}\n` +
          `Duration: ${output.duration}\n\n` +
          "Raw Response:\n" +
          JSON.stringify(output, null, 2);
      } catch (error) {
        result.textContent = `Error: ${error.message}`;
      }
    });

    
  </script>
</body>
</html>
