<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DProtein Recommendations</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f7f4ed;
      color: #1f1f1f;
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #d9d1bf;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d0c7b6;
      border-radius: 10px;
      padding: 0.65rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #205c3b;
      color: white;
      padding: 0.8rem 1.2rem;
      cursor: pointer;
      font-size: 1rem;
    }

    .row {
      margin-bottom: 1rem;
    }

    .status {
      color: #4b4b4b;
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    .card {
      border: 1px solid #d8cfbd;
      border-radius: 12px;
      padding: 0.9rem;
      margin-bottom: 0.75rem;
      background: #f9f5ec;
    }

    .subcard {
      border: 1px dashed #c7bda8;
      border-radius: 10px;
      padding: 0.6rem;
      margin-top: 0.5rem;
      background: #fffdf8;
    }

    .top {
      border-color: #2a7a4f;
      background: #edf7ef;
    }

    pre {
      background: #f3eee2;
      padding: 1rem;
      border-radius: 12px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>DProtein Recommendations</h1>
    <p><a href="/">Back to Distance Tester</a></p>
    <p>Find the closest protein options for a keyword like <code>smoothie</code> or <code>chicken</code>.</p>

    <div class="row">
      <label><strong>Origin option 1:</strong> Use current location</label><br>
      <button id="use-current-btn" type="button">Use current location</button>
      <div id="current-status" class="status">Current location not set yet.</div>
    </div>

    <div class="row">
      <label for="origin-text"><strong>Origin option 2:</strong> Type origin manually</label>
      <input id="origin-text" type="text" placeholder="e.g. Shields Library, Davis CA">
    </div>

    <div class="row">
      <label for="keyword-input"><strong>Food keyword</strong></label>
      <input id="keyword-input" type="text" placeholder="e.g. smoothie">
    </div>

    <div class="row">
      <label for="travel-mode"><strong>Travel mode</strong></label>
      <select id="travel-mode">
        <option value="walking">Walking</option>
        <option value="driving">Driving</option>
      </select>
    </div>

    <div class="row">
      <label for="max-results"><strong>Max results</strong></label>
      <input id="max-results" type="number" min="1" max="10" value="5">
    </div>

    <div class="row">
      <label for="sort-mode"><strong>Sort mode</strong></label>
      <select id="sort-mode">
        <option value="protein">Top Protein (Campus-wide)</option>
        <option value="closest">Closest Matches</option>
      </select>
    </div>

    <div class="row">
      <label for="result-mode"><strong>Result mode</strong></label>
      <select id="result-mode">
        <option value="global">Single Top List</option>
        <option value="per_hall">Top Per Dining Hall</option>
      </select>
    </div>

    <div class="row">
      <label for="per-hall-limit"><strong>Per-hall limit</strong></label>
      <select id="per-hall-limit">
        <option value="5">Top 5 per hall</option>
        <option value="10">Top 10 per hall</option>
      </select>
    </div>

    <button id="find-btn" type="button">Find Protein Options</button>

    <div class="row" style="margin-top: 1rem;">
      <button id="load-favorites-btn" type="button">Load Favorites</button>
      <button id="load-tracker-btn" type="button" style="margin-left: 0.5rem;">Load Tracker (Available Now)</button>
      <button id="load-tracker-schedule-btn" type="button" style="margin-left: 0.5rem;">Load Tracker Schedule</button>
    </div>

    <h3>Favorites</h3>
    <pre id="favorites-output">No favorites loaded yet.</pre>

    <h3>Tracker</h3>
    <pre id="tracker-output">No tracker data loaded yet.</pre>

    <h3>Tracker Schedule</h3>
    <pre id="tracker-schedule-output">No tracker schedule loaded yet.</pre>

    <h3>Results</h3>
    <div id="cards"></div>
    <pre id="raw-output">Ready.</pre>
  </main>

  <script>
    const useCurrentButton = document.getElementById("use-current-btn");
    const currentStatus = document.getElementById("current-status");
    const originTextInput = document.getElementById("origin-text");
    const keywordInput = document.getElementById("keyword-input");
    const travelModeInput = document.getElementById("travel-mode");
    const maxResultsInput = document.getElementById("max-results");
    const sortModeInput = document.getElementById("sort-mode");
    const resultModeInput = document.getElementById("result-mode");
    const perHallLimitInput = document.getElementById("per-hall-limit");
    const findButton = document.getElementById("find-btn");
    const loadFavoritesButton = document.getElementById("load-favorites-btn");
    const loadTrackerButton = document.getElementById("load-tracker-btn");
    const loadTrackerScheduleButton = document.getElementById("load-tracker-schedule-btn");
    const cardsContainer = document.getElementById("cards");
    const favoritesOutput = document.getElementById("favorites-output");
    const trackerOutput = document.getElementById("tracker-output");
    const trackerScheduleOutput = document.getElementById("tracker-schedule-output");
    const rawOutput = document.getElementById("raw-output");

    let currentOrigin = null;

    async function requestRecommendations(recommendationRequestBody) {
      const response = await fetch("/api/recommendations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(recommendationRequestBody)
      });

      const responseJson = await response.json();
      if (!response.ok) {
        throw new Error(responseJson.detail || "Recommendation request failed.");
      }
      return responseJson;
    }

    async function starFavorite(itemName) {
      const response = await fetch("/api/favorites/star", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ item_name: itemName }),
      });
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "Failed to star item.");
      }
      return data;
    }

    async function fetchFavorites() {
      const response = await fetch("/api/favorites");
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "Failed to load favorites.");
      }
      return data;
    }

    async function fetchTracker() {
      const response = await fetch("/api/tracker/available-now");
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "Failed to load tracker.");
      }
      return data;
    }

    async function fetchTrackerSchedule() {
      const response = await fetch("/api/tracker/schedule");
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.detail || "Failed to load tracker schedule.");
      }
      return data;
    }

    // Global renderer: single ranked list across all halls.
    function renderGlobalCards(recommendations) {
      cardsContainer.innerHTML = "";
      recommendations.forEach((recommendation, index) => {
        const card = document.createElement("div");
        card.className = `card ${index === 0 ? "top" : ""}`;
        card.innerHTML =
          `<strong>${index + 1}. ${recommendation.venue_name}</strong> (${recommendation.venue_category})<br>` +
          `Best Match: ${recommendation.item_name}<br>` +
          `Protein: ${recommendation.protein_grams}g<br>` +
          `Calories: ${recommendation.calories ?? "N/A"}<br>` +
          `Distance: ${recommendation.distance_miles ?? "N/A"} miles<br>` +
          `Duration: ${recommendation.duration ?? "N/A"}<br>` +
          `Tags: ${(recommendation.tags || []).join(", ")}<br>` +
          `<em>${recommendation.why_selected}</em><br>` +
          `<button type="button" class="star-btn" data-item-name="${recommendation.item_name.replace(/"/g, "&quot;")}">Star Item</button>`;
        cardsContainer.appendChild(card);
      });
    }

    // Per-hall renderer: each dining hall gets its own top-N list.
    function renderPerHallCards(perHallGroups) {
      cardsContainer.innerHTML = "";
      perHallGroups.forEach((group) => {
        const hallBlock = document.createElement("div");
        hallBlock.className = "card";
        hallBlock.innerHTML = `<strong>${group.venue_name}</strong>`;

        (group.items || []).forEach((item, idx) => {
          const itemDiv = document.createElement("div");
          itemDiv.className = "subcard";
          itemDiv.innerHTML =
            `${idx + 1}. ${item.item_name} | ${item.protein_grams}g` +
            ` | Calories: ${item.calories ?? "N/A"}` +
            ` | ${item.distance_miles ?? "N/A"} miles` +
            ` <button type="button" class="star-btn" data-item-name="${item.item_name.replace(/"/g, "&quot;")}">Star Item</button>`;
          hallBlock.appendChild(itemDiv);
        });

        cardsContainer.appendChild(hallBlock);
      });
    }

    function renderRecommendationCards(responseJson) {
      cardsContainer.innerHTML = "";
      const recommendations = responseJson.recommendations || [];
      const perHallRecommendations = responseJson.per_hall_recommendations || [];

      if (recommendations.length === 0 && perHallRecommendations.length === 0) {
        const message = responseJson.message || "No matching protein options found.";
        cardsContainer.innerHTML = `<div class="card">${message}</div>`;
        return;
      }

      if (responseJson.result_mode === "per_hall") {
        renderPerHallCards(perHallRecommendations);
      } else {
        renderGlobalCards(recommendations);
      }
    }

    async function loadFavoritesIntoPanel() {
      favoritesOutput.textContent = "Loading favorites...";
      try {
        const data = await fetchFavorites();
        favoritesOutput.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        favoritesOutput.textContent = `Error: ${error.message}`;
      }
    }

    async function loadTrackerIntoPanel() {
      trackerOutput.textContent = "Loading tracker...";
      try {
        const data = await fetchTracker();
        trackerOutput.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        trackerOutput.textContent = `Error: ${error.message}`;
      }
    }

    async function loadTrackerScheduleIntoPanel() {
      trackerScheduleOutput.textContent = "Loading tracker schedule...";
      try {
        const data = await fetchTrackerSchedule();
        trackerScheduleOutput.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        trackerScheduleOutput.textContent = `Error: ${error.message}`;
      }
    }

    useCurrentButton.addEventListener("click", () => {
      if (!navigator.geolocation) {
        currentStatus.textContent = "Geolocation is not supported in this browser.";
        return;
      }

      currentStatus.textContent = "Requesting your current location...";
      navigator.geolocation.getCurrentPosition(
        (position) => {
          const { latitude, longitude } = position.coords;
          currentOrigin = { latitude, longitude };
          currentStatus.textContent = `Current location set: ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
        },
        (error) => {
          currentStatus.textContent = `Location error: ${error.message}`;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });

    findButton.addEventListener("click", async () => {
      const keyword = keywordInput.value.trim();
      const typedOrigin = originTextInput.value.trim();
      const travelMode = travelModeInput.value;
      const maxResults = Number(maxResultsInput.value || "5");
      const sortMode = sortModeInput.value;
      const resultMode = resultModeInput.value;
      const perHallLimit = Number(perHallLimitInput.value || "5");

      const recommendationRequestBody = {
        keyword: keyword,
        travel_mode: travelMode,
        max_results: maxResults,
        sort_mode: sortMode,
        result_mode: resultMode,
        per_hall_limit: perHallLimit,
      };

      if (sortMode === "closest") {
        if (typedOrigin) {
          recommendationRequestBody.origin_mode = "typed";
          recommendationRequestBody.origin_text = typedOrigin;
        } else if (currentOrigin) {
          recommendationRequestBody.origin_mode = "current";
          recommendationRequestBody.origin_latitude = currentOrigin.latitude;
          recommendationRequestBody.origin_longitude = currentOrigin.longitude;
        } else {
          rawOutput.textContent = "Closest mode needs origin: current location or typed origin.";
          return;
        }
      }

      rawOutput.textContent = "Finding protein options...";
      cardsContainer.innerHTML = "";

      try {
        const responseJson = await requestRecommendations(recommendationRequestBody);
        renderRecommendationCards(responseJson);
        rawOutput.textContent = JSON.stringify(responseJson, null, 2);
      } catch (error) {
        rawOutput.textContent = `Error: ${error.message}`;
      }
    });

    loadFavoritesButton.addEventListener("click", async () => {
      await loadFavoritesIntoPanel();
    });

    loadTrackerButton.addEventListener("click", async () => {
      await loadTrackerIntoPanel();
    });

    loadTrackerScheduleButton.addEventListener("click", async () => {
      await loadTrackerScheduleIntoPanel();
    });

    cardsContainer.addEventListener("click", async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) {
        return;
      }
      if (!target.classList.contains("star-btn")) {
        return;
      }
      const itemName = target.getAttribute("data-item-name");
      if (!itemName) {
        return;
      }
      target.textContent = "Starring...";
      try {
        await starFavorite(itemName);
        target.textContent = "Starred";
        await loadFavoritesIntoPanel();
      } catch (error) {
        target.textContent = "Star Item";
        rawOutput.textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
